services:
  cuisine_app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: cuisine_app
    volumes:
      - "${LOCAL_PATH}:/var/www/html"
      - cuisine_storage:/var/www/html/storage
      - cuisine_cache:/var/www/html/bootstrap/cache
      - cuisine_vendor:/var/www/html/vendor
    env_file:
      - .env
    command: >
      sh -c "until pg_isready -h postgres -p 5432 -U \"$${POSTGRES_USER}\"; do sleep 2; done
      && composer install --no-interaction --prefer-dist
      && php artisan migrate --force
      && if [ ! -L public/storage ]; then php artisan storage:link; fi
      && php-fpm"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: cuisine_nginx
    ports:
      - "${PHP_PORT}:80"
    volumes:
      - "${LOCAL_PATH}:/var/www/html"
      - cuisine_storage:/var/www/html/storage
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cuisine_app

  angular_app:
    build:
      context: ./cuisine-frontend
      dockerfile: Dockerfile
    container_name: cuisine_angular
    ports:
      - "4201:4200"
    volumes:
      - ./cuisine-frontend:/app
      - cuisine_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "npm install
      && npm run start -- --host 0.0.0.0 --poll 2000"
    stdin_open: true
    tty: true

  postgres:
    image: postgres:17-alpine
    container_name: cuisine_postgres
    restart: always
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - cuisine_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: cuisine_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD}"
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  cuisine_cache:
  cuisine_db_data:
  cuisine_node_modules:
  cuisine_storage:
  cuisine_vendor: